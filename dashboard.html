<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prospects — Bilan CPF</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f7;color:#1d1d1f;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:#0066cc;text-decoration:none}
a:hover{text-decoration:underline}

.nav{background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:0.5px solid rgba(0,0,0,0.1);padding:0 32px;height:52px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.nav-dot{width:7px;height:7px;border-radius:50%;background:#34c759;flex-shrink:0;animation:pulse 3s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.nav-title{font-size:15px;font-weight:500;letter-spacing:-0.2px}
.nav-sep{width:1px;height:16px;background:rgba(0,0,0,0.12)}
.nav-time{font-size:12px;color:#86868b}
.nav-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.nav-btn{height:28px;padding:0 14px;border-radius:14px;border:0.5px solid rgba(0,0,0,0.18);background:transparent;font-size:12px;cursor:pointer;color:#1d1d1f;font-family:inherit;display:flex;align-items:center;gap:5px;transition:background .12s}
.nav-btn:hover{background:rgba(0,0,0,0.05)}
.spin{display:inline-block}
.nav-btn.spinning .spin{animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}

.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.08)}
.stat{padding:18px 32px;border-right:0.5px solid rgba(0,0,0,0.08)}
.stat:last-child{border-right:none}
.stat-n{font-size:34px;font-weight:600;letter-spacing:-1.5px;line-height:1}
.stat-l{font-size:12px;color:#86868b;margin-top:3px;letter-spacing:-0.1px}
.stat-bar{height:2px;margin-top:10px;border-radius:1px;background:#f0f0f0;overflow:hidden}
.stat-fill{height:100%;border-radius:1px;transition:width .8s ease}
.n1{color:#1d1d1f}.f1{background:#aeaeb2}
.n2{color:#ff3b30}.f2{background:#ff3b30}
.n3{color:#ff9500}.f3{background:#ff9500}
.n4{color:#34c759}.f4{background:#34c759}

.toolbar{background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.08);padding:8px 32px;display:flex;gap:5px;align-items:center}
.fbtn{height:28px;padding:0 14px;border-radius:14px;border:0.5px solid rgba(0,0,0,0.15);background:transparent;font-size:13px;cursor:pointer;color:#86868b;font-family:inherit;transition:all .12s;display:flex;align-items:center;gap:5px}
.fbtn:hover{background:rgba(0,0,0,0.04);color:#1d1d1f}
.fbtn.active-all{background:#1d1d1f;color:#fff;border-color:#1d1d1f}
.fbtn.active-hot{background:#fff2f1;border-color:rgba(255,59,48,.3);color:#c0392b}
.fbtn.active-warm{background:#fff8ee;border-color:rgba(255,149,0,.3);color:#b45309}
.cnt{font-size:10px;font-weight:600;padding:1px 5px;border-radius:8px;background:rgba(0,0,0,0.07)}
.active-hot .cnt{background:rgba(255,59,48,.12);color:#c0392b}
.active-warm .cnt{background:rgba(255,149,0,.12);color:#b45309}
.sort-sel{margin-left:auto;height:28px;padding:0 10px;border-radius:8px;border:0.5px solid rgba(0,0,0,0.15);background:#fff;font-size:12px;color:#86868b;cursor:pointer;font-family:inherit;outline:none}

.feed{padding:24px 32px;display:flex;flex-direction:column;gap:8px;max-width:880px}

.sec{display:flex;align-items:center;gap:10px;padding:10px 0 4px;font-size:11px;font-weight:600;letter-spacing:.04em;color:#86868b}
.sec.hot{color:#ff3b30}.sec.warm{color:#ff9500}
.sec-line{flex:1;height:0.5px;background:rgba(0,0,0,0.08)}
.sec-n{font-size:11px;padding:1px 7px;border-radius:10px;background:rgba(0,0,0,0.06);color:#86868b;font-weight:500}
.hot .sec-n{background:rgba(255,59,48,.1);color:#c0392b}
.warm .sec-n{background:rgba(255,149,0,.1);color:#b45309}
.new-pill{font-size:10px;padding:2px 7px;border-radius:10px;background:#fff8ee;color:#b45309;border:0.5px solid rgba(255,149,0,.2)}

.card{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:18px;padding:20px 22px;transition:border-color .15s,box-shadow .15s}
.card:hover{border-color:rgba(0,0,0,.2);box-shadow:0 2px 12px rgba(0,0,0,.06)}
.card.is-urgent{border-color:rgba(255,59,48,.2)}
.card.is-new{border-color:rgba(255,149,0,.2)}

.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.card-who{display:flex;align-items:center;gap:10px}
.ava{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.ava-0{background:#ffeeed;color:#c0392b}.ava-1{background:#fff3e0;color:#e65100}
.ava-2{background:#e8f5e9;color:#2e7d32}.ava-3{background:#e3f2fd;color:#1565c0}.ava-4{background:#f3e5f5;color:#6a1b9a}
.who-name{font-size:13px;font-weight:500;letter-spacing:-0.1px}
.who-meta{font-size:11px;color:#86868b;margin-top:1px}
.tags{display:flex;gap:4px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.tag{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:500;letter-spacing:-0.1px}
.tag-hot{background:#ffeeed;color:#c0392b}
.tag-warm{background:#fff8ee;color:#b45309}
.tag-new{background:#fff8ee;color:#b45309;border:0.5px solid rgba(255,149,0,.25)}
.tag-src{background:#f5f5f7;color:#86868b;font-weight:400}
.tag-tp{background:#e8f5e9;color:#2e7d32}
.tag-yt{background:#ffeeed;color:#c0392b}

.card-title{font-size:14px;font-weight:500;line-height:1.45;margin-bottom:6px;letter-spacing:-0.2px}
.card-txt{font-size:13px;color:#515154;line-height:1.65;margin-bottom:14px}

.why-box{background:#f5f3ff;border-radius:10px;padding:10px 14px;margin-bottom:10px}
.why-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.why-dot{width:5px;height:5px;border-radius:50%;background:#7c3aed;flex-shrink:0}
.why-lbl{font-size:11px;color:#6d28d9;font-weight:500;letter-spacing:.03em}
.why-pct{margin-left:auto;font-size:12px;font-weight:600;color:#7c3aed;font-variant-numeric:tabular-nums}
.why-track{height:2.5px;background:rgba(124,58,237,.15);border-radius:2px;overflow:hidden;margin-bottom:6px}
.why-prog{height:100%;border-radius:2px;background:#7c3aed;transition:width .6s ease}
.why-txt{font-size:12px;color:#5b21b6;line-height:1.55}

.msg-box{border:0.5px solid rgba(0,0,0,0.1);border-radius:10px;padding:12px 14px;margin-bottom:14px;background:#fafafa}
.msg-head{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.msg-dot{width:4px;height:4px;border-radius:50%;background:#aeaeb2;flex-shrink:0}
.msg-lbl{font-size:11px;color:#86868b;font-weight:500;letter-spacing:.03em}
.msg-regen{margin-left:auto;font-size:11px;color:#0066cc;background:transparent;border:none;cursor:pointer;padding:0;font-family:inherit}
.msg-regen:hover{text-decoration:underline}
.msg-txt{font-size:13px;color:#515154;line-height:1.65;font-style:italic}

.card-foot{display:flex;align-items:center;gap:6px;padding-top:14px;border-top:0.5px solid rgba(0,0,0,0.07)}
.btn-main{height:32px;padding:0 18px;border-radius:16px;border:none;font-size:13px;font-weight:500;cursor:pointer;color:#fff;font-family:inherit;transition:opacity .12s}
.btn-main:hover{opacity:.85}
.btn-hot{background:#ff3b30}.btn-warm{background:#ff9500}
.btn-sec{height:32px;padding:0 14px;border-radius:16px;border:0.5px solid rgba(0,0,0,0.18);background:transparent;font-size:13px;cursor:pointer;color:#1d1d1f;font-family:inherit;transition:background .12s}
.btn-sec:hover{background:rgba(0,0,0,.04)}
.post-link{margin-left:auto;font-size:12px;color:#0066cc}
.post-link:hover{text-decoration:underline;cursor:pointer}

.loading{text-align:center;padding:80px 0;color:#86868b}
.spinner{width:24px;height:24px;border:2px solid #e5e5ea;border-top-color:#86868b;border-radius:50%;animation:rot .7s linear infinite;margin:0 auto 12px}
.empty{text-align:center;padding:80px 0;color:#86868b;font-size:13px}
.err-bar{background:#fff2f1;border:0.5px solid rgba(255,59,48,.2);border-radius:10px;padding:10px 16px;margin-bottom:12px;font-size:12px;color:#c0392b;display:none}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-dot"></div>
  <span class="nav-title">Prospects — Bilan CPF</span>
  <div class="nav-sep"></div>
  <span class="nav-time" id="lastUpdate">Chargement...</span>
  <div class="nav-r">
    <span style="font-size:12px;color:#86868b">actu. dans <span id="nextRefresh">30</span> min</span>
    <button class="nav-btn" onclick="loadData(true)" id="refreshBtn"><span class="spin">↻</span> Actualiser</button>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-n n1" id="sTotal">—</div><div class="stat-l">signaux détectés</div><div class="stat-bar"><div class="stat-fill f1" style="width:100%"></div></div></div>
  <div class="stat"><div class="stat-n n2" id="sHot">—</div><div class="stat-l">à contacter maintenant</div><div class="stat-bar"><div class="stat-fill f2" id="bHot" style="width:0%"></div></div></div>
  <div class="stat"><div class="stat-n n3" id="sWarm">—</div><div class="stat-l">en réflexion</div><div class="stat-bar"><div class="stat-fill f3" id="bWarm" style="width:0%"></div></div></div>
  <div class="stat"><div class="stat-n n4" id="sCold">—</div><div class="stat-l">à surveiller</div><div class="stat-bar"><div class="stat-fill f4" id="bCold" style="width:0%"></div></div></div>
</div>

<div class="toolbar">
  <button class="fbtn active-all" id="f-all" onclick="setFilter('all')">Tous</button>
  <button class="fbtn" id="f-hot" onclick="setFilter('hot')">À contacter <span class="cnt" id="cnt-hot">—</span></button>
  <button class="fbtn" id="f-warm" onclick="setFilter('warm')">En réflexion <span class="cnt" id="cnt-warm">—</span></button>
  <button class="fbtn" id="f-cold" onclick="setFilter('cold')">À surveiller</button>
  <select class="sort-sel" id="sortSel" onchange="renderPosts()">
    <option value="date">Plus récents</option>
    <option value="heat">Par pertinence</option>
  </select>
</div>

<div class="feed">
  <div id="errBar" class="err-bar">Render se réveille, chargement en cours...</div>
  <div id="results"><div class="loading"><div class="spinner"></div>Analyse des signaux en cours...</div></div>
</div>

<script>
let allPosts=[],currentFilter='all',refreshTimer=null,countdownTimer=null,mins=30;
const AVA=['ava-0','ava-1','ava-2','ava-3','ava-4'];
function av(n){return AVA[(n||'?').charCodeAt(0)%AVA.length]}

function age(ts){
  if(!ts)return{l:'?',isNew:false};
  const d=(Date.now()/1000-ts),h=d/3600,j=d/86400;
  if(h<24)return{l:"aujourd'hui",isNew:true};
  if(j<2)return{l:'hier',isNew:true};
  if(j<7)return{l:'il y a '+Math.floor(j)+'j',isNew:false};
  if(j<30)return{l:'il y a '+Math.floor(j/7)+'sem',isNew:false};
  return{l:'il y a '+Math.floor(j/30)+'mois',isNew:false};
}

function heat(p){
  const t=(p.title+' '+p.text).toLowerCase();
  if(p.source==='Trustpilot'||t.includes('bilan de comp')||t.includes('cpf')||t.includes('financer'))return'hot';
  if(t.includes('burn')||t.includes('reconversion')||t.includes('changer de m')||t.includes('souffrance')||t.includes('rupture')||t.includes('plus de sens')||t.includes('demission'))return'warm';
  return'cold';
}

function score(p){
  const t=(p.title+' '+p.text).toLowerCase();
  let s=20;
  if(t.includes('bilan de comp'))s+=35;
  if(t.includes('cpf'))s+=25;
  if(t.includes('financer'))s+=20;
  if(p.source==='Trustpilot')s+=20;
  if(t.includes('reconversion'))s+=15;
  if(t.includes('burn'))s+=12;
  if(t.includes('souffrance'))s+=10;
  if(p.score>10)s+=5;
  const j=(Date.now()/1000-(p.date||0))/86400;
  if(j<1)s+=8;else if(j<3)s+=4;
  return Math.min(s,99);
}

function why(p){
  const t=(p.title+' '+p.text).toLowerCase();
  if(p.source==='Trustpilot')return'A déjà fait un bilan chez un concurrent et en est déçu. Cherche activement un meilleur organisme. Signal le plus fort possible : la décision est prise, il manque juste le bon interlocuteur.';
  if(t.includes('bilan de comp')&&t.includes('cpf'))return'Mentionne explicitement le bilan de compétences et le CPF. Déjà dans la démarche, probablement en train de comparer les organismes. Contacter maintenant.';
  if(t.includes('bilan de comp'))return'A terminé ou envisage un bilan de compétences. En phase de décision active. Le timing est parfait pour proposer un accompagnement.';
  if(t.includes('burn'))return'En sortie de burn-out, cherche à se reconstruire professionnellement. Très réceptif à un accompagnement bienveillant. Approche douce recommandée — proposer un premier échange sans engagement.';
  if(t.includes('reconversion'))return'Réflexion active sur une reconversion. Cherche de la clarté sur son projet. Le bilan CPF est exactement l'outil dont il a besoin — mais il ne le sait peut-être pas encore.';
  if(t.includes('rupture')||t.includes('licenci'))return'Rupture conventionnelle ou licenciement. Personne disponible et motivée à rebondir. Fenêtre d'opportunité courte — à contacter rapidement.';
  return'Signal de souffrance professionnelle. Peut évoluer vers une demande de reconversion. À suivre de près.';
}

function msg(p){
  const t=(p.title+' '+p.text).toLowerCase();
  const raw=p.author||'';
  const prenom=raw.startsWith('u/')?raw.slice(2).split('_')[0]:raw.startsWith('@')?raw.slice(1):raw.split(' ')[0];
  const P=prenom.charAt(0).toUpperCase()+prenom.slice(1).toLowerCase();

  if(p.source==='Trustpilot'){
    return'Bonjour '+P+', j'ai lu votre avis sur votre bilan et je comprends totalement votre déception — un parcours trop théorique, sans vraiment vous aider à clarifier votre direction, c'est frustrant. Ce que vous décrivez, c'est exactement ce qu'on cherche à éviter. Chez nous, chaque bilan est construit autour de vous : vos contraintes réelles, votre personnalité, ce qui vous donne de l'énergie. Si vous êtes encore en recherche d'un accompagnement sérieux, je serais heureux d'échanger avec vous 20 min — sans engagement, juste pour voir si ce qu'on fait correspond à ce que vous cherchez.';
  }

  if(t.includes('bilan de comp')&&t.includes('reconversion')&&t.includes('cpf')){
    const metier=p.title.match(/reconversions+(w+)/i)?.[1]||'nouveau métier';
    return'Bonjour '+P+', votre post sur votre reconversion m'a parlé. Vous venez de terminer votre bilan — vous êtes dans cette période un peu flottante où on a des pistes mais pas encore de cap solide. C'est exactement le moment où un accompagnement sur mesure peut faire la différence pour transformer ces pistes en projet concret. Vous avez encore du CPF disponible ? Si oui, on pourrait en parler ensemble rapidement.';
  }

  if(t.includes('bilan de comp')){
    return'Bonjour '+P+', j'ai vu votre message. La question du bilan de compétences revient souvent à ce moment charnière — on sent qu'on a besoin de se repositionner mais on ne sait pas encore par où commencer. Ce que je vous propose : un échange de 20 min pour comprendre votre situation et voir si notre approche peut vraiment vous aider. C'est gratuit, sans pression, et ça vous donnera déjà des éléments concrets. Ça vous dit ?';
  }

  if(t.includes('burn')){
    return'Bonjour '+P+', ce que vous partagez prend du courage. Un an et demi à reconstruire, c'est long — et la question "par où je repars professionnellement" est souvent la dernière qu'on ose se poser, alors qu'elle est pourtant essentielle. Un bilan de compétences peut être un espace pour faire le point sans pression, à votre rythme. C'est entièrement financé par votre CPF, donc aucun coût. Si jamais vous ressentez le besoin d'en parler, je suis disponible — aucune obligation.';
  }

  if(t.includes('reconversion')){
    return'Bonjour '+P+', j'ai lu votre situation avec attention. Tourner en rond pendant 2 ans sur une reconversion, c'est épuisant — surtout quand on a envie de bouger mais qu'on ne sait pas vers quoi. Le bilan de compétences CPF est fait exactement pour ça : clarifier ce qui vous correspond vraiment, identifier des pistes concrètes, et construire un plan. Et c'est 100% financé, sans avancer un euro. Envie qu'on en parle ?';
  }

  return'Bonjour '+P+', votre message m'a interpellé. La situation que vous décrivez — ne plus se sentir à sa place, chercher un sens à ce qu'on fait — c'est souvent le signe qu'il est temps de prendre du recul. Un bilan de compétences peut vraiment aider à y voir plus clair, et c'est entièrement financé par votre CPF. Je serais heureux d'en discuter avec vous si ça vous intéresse.';
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function srcTag(s){
  if(s==='YouTube')return'<span class="tag tag-src tag-yt">YouTube</span>';
  if(s==='Trustpilot')return'<span class="tag tag-src tag-tp">Trustpilot</span>';
  return'<span class="tag tag-src">Reddit</span>';
}

function setFilter(f){
  currentFilter=f;
  ['all','hot','warm','cold'].forEach(x=>{
    document.getElementById('f-'+x).className='fbtn'+(x===f?' active-'+f:'');
  });
  renderPosts();
}

function renderPosts(){
  const base=currentFilter==='all'?allPosts:allPosts.filter(p=>p.h===currentFilter);
  const mode=document.getElementById('sortSel').value;
  const sorted=[...base].sort((a,b)=>{
    if(mode==='heat'){const r={hot:0,warm:1,cold:2};return r[a.h]-r[b.h]||(b.date||0)-(a.date||0);}
    return(b.date||0)-(a.date||0);
  });
  const box=document.getElementById('results');
  if(!sorted.length){box.innerHTML='<div class="empty">Aucun signal pour ce filtre</div>';return;}
  const g={hot:[],warm:[],cold:[]};
  sorted.forEach(p=>g[p.h].push(p));
  const labels={hot:'À CONTACTER MAINTENANT',warm:'EN RÉFLEXION',cold:'À SURVEILLER'};
  let html='';
  ['hot','warm','cold'].forEach(h=>{
    if(!g[h].length)return;
    const nc=g[h].filter(p=>age(p.date).isNew).length;
    html+=`<div class="sec ${h}">${labels[h]}<div class="sec-line"></div><span class="sec-n">${g[h].length}</span>${nc?`<span class="new-pill">${nc} nouveau${nc>1?'x':''}</span>`:''}</div>`;
    g[h].forEach(p=>{
      const a=age(p.date),s=p.s,m=p.m,w=p.w,ini=(p.author||'?').substring(0,2).toUpperCase(),isUrg=h==='hot';
      const msgEsc=esc(m);
      html+=`<div class="card${isUrg?' is-urgent':a.isNew?' is-new':''}">
<div class="card-top">
  <div class="card-who">
    <div class="ava ${av(p.author)}">${ini}</div>
    <div><div class="who-name">${esc(p.author)}</div><div class="who-meta">${a.l} · ${esc(p.subreddit||p.source)} · ${esc(p.source)}</div></div>
  </div>
  <div class="tags">
    ${a.isNew?'<span class="tag tag-new">nouveau</span>':''}
    ${srcTag(p.source)}
    <span class="tag tag-${h}">${h==='hot'?'à contacter':h==='warm'?'en réflexion':'à surveiller'}</span>
  </div>
</div>
<div class="card-title">${esc(p.title)}</div>
<div class="card-txt">${esc(p.text.substring(0,220))}${p.text.length>220?'...':''}</div>
<div class="why-box">
  <div class="why-row"><div class="why-dot"></div><span class="why-lbl">Pourquoi ce prospect</span><span class="why-pct">${s} %</span></div>
  <div class="why-track"><div class="why-prog" style="width:${s}%"></div></div>
  <div class="why-txt">${w}</div>
</div>
<div class="msg-box">
  <div class="msg-head"><div class="msg-dot"></div><span class="msg-lbl">Message personnalisé</span><button class="msg-regen">↻ regénérer</button></div>
  <div class="msg-txt">${msgEsc}</div>
</div>
<div class="card-foot">
  <button class="btn-main btn-${h==='hot'?'hot':h==='warm'?'warm':'sec'}" onclick="this.textContent='✓ Envoyé'">Envoyer</button>
  <button class="btn-sec" onclick="navigator.clipboard?.writeText(${JSON.stringify(m)});this.textContent='✓ Copié';setTimeout(()=>this.textContent='Copier',2000)">Copier</button>
  <button class="btn-sec" onclick="this.closest('.card').style.opacity='.3';this.closest('.card').style.pointerEvents='none'">Archiver</button>
  <span class="post-link" onclick="window.open(${JSON.stringify(p.url)},'_blank')">Voir le post →</span>
</div>
</div>`;
    });
  });
  box.innerHTML=html;
}

function updateStats(){
  const hot=allPosts.filter(p=>p.h==='hot'),warm=allPosts.filter(p=>p.h==='warm'),cold=allPosts.filter(p=>p.h==='cold'),tot=allPosts.length;
  document.getElementById('sTotal').textContent=tot;
  document.getElementById('sHot').textContent=hot.length;
  document.getElementById('sWarm').textContent=warm.length;
  document.getElementById('sCold').textContent=cold.length;
  document.getElementById('cnt-hot').textContent=hot.length;
  document.getElementById('cnt-warm').textContent=warm.length;
  if(tot>0){
    document.getElementById('bHot').style.width=Math.round(hot.length/tot*100)+'%';
    document.getElementById('bWarm').style.width=Math.round(warm.length/tot*100)+'%';
    document.getElementById('bCold').style.width=Math.round(cold.length/tot*100)+'%';
  }
}

function startCountdown(){
  clearInterval(countdownTimer);mins=30;
  document.getElementById('nextRefresh').textContent=mins;
  countdownTimer=setInterval(()=>{mins--;if(mins<=0)mins=30;document.getElementById('nextRefresh').textContent=mins;},60000);
}

async function loadData(manual=false){
  const btn=document.getElementById('refreshBtn'),err=document.getElementById('errBar');
  btn.classList.add('spinning');
  if(manual)document.getElementById('results').innerHTML='<div class="loading"><div class="spinner"></div>Analyse des signaux...</div>';
  try{
    const r=await fetch('/search');
    if(!r.ok)throw new Error();
    const data=await r.json();
    err.style.display='none';
    const seen=new Set();
    allPosts=data.posts.filter(p=>{if(seen.has(p.id))return false;seen.add(p.id);return true;}).map(p=>({...p,h:heat(p),s:score(p),w:why(p),m:msg(p)}));
    updateStats();renderPosts();
    document.getElementById('lastUpdate').textContent='Mis à jour à '+new Date().toLocaleTimeString('fr-FR');
    startCountdown();
  }catch(e){
    err.style.display='block';
    if(manual)document.getElementById('results').innerHTML='<div class="empty">Erreur de connexion — réessaie dans quelques secondes</div>';
  }
  btn.classList.remove('spinning');
}
function scheduleAuto(){clearTimeout(refreshTimer);refreshTimer=setTimeout(()=>{loadData();scheduleAuto();},30*60*1000);}
loadData(true);scheduleAuto();startCountdown();
</script>
</body>
</html>
